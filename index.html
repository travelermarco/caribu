<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#090D14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Caribù</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<!-- SPLASH -->
<div id="splash" role="presentation" aria-hidden="true">
  <div class="splash-logo-wrap">
    <img class="splash-logo-ghost" src="/icons/icon.svg" alt="">
    <div class="splash-logo-fill">
      <img src="/icons/icon.svg" alt="">
    </div>
  </div>
  <span class="splash-brand">Caribù</span>
</div>

<div id="app">

  <!-- Header -->
  <header class="app-header">
    <h1>🚐 Caribù</h1>
    <div style="display:flex;align-items:center;gap:10px">
      <button id="theme-toggle" title="Tema chiaro/scuro" onclick="window.toggleTheme()">🌙</button>
      <div class="conn-dots" title="Stato connessioni">
        <div class="conn-dot" id="dot-heater" title="Riscaldatore"></div>
        <div class="conn-dot" id="dot-bms"    title="Batterie"></div>
        <div class="conn-dot" id="dot-mppt1"  title="MPPT 1"></div>
        <div class="conn-dot" id="dot-mppt2"  title="MPPT 2"></div>
      </div>
    </div>
  </header>

  <!-- ── Dashboard ────────────────────────────────────────────────────────── -->
  <section class="screen active" id="screen-dash">

    <!-- Reconnect banner (shown when getDevices() not available) -->
    <div id="reconnect-banner" class="reconnect-banner" style="display:none"></div>

    <!-- Weather alerts banner -->
    <div id="weather-alerts-area" style="display:none"></div>

    <div class="grid-2">
      <div class="stat-card" onclick="switchTab('heater')" style="cursor:pointer">
        <div class="stat-label">🔥 Riscaldatore</div>
        <div id="dash-heater"></div>
      </div>
      <div class="stat-card" onclick="switchTab('bms')" style="cursor:pointer">
        <div class="stat-label">🔋 Batterie</div>
        <div id="dash-bms"></div>
      </div>
      <div class="stat-card" onclick="switchTab('victron')" style="cursor:pointer">
        <div class="stat-label">☀️ Solare</div>
        <div id="dash-solar"></div>
      </div>
      <div class="stat-card" onclick="switchTab('imou')" style="cursor:pointer">
        <div class="stat-label">📷 Camere</div>
        <div id="dash-imou"></div>
      </div>
    </div>

    <!-- Bilancio energetico -->
    <div class="card" id="energy-balance-card" style="display:none">
      <div class="card-title">⚡ Bilancio energetico</div>
      <div id="energy-balance-body"></div>
    </div>

    <!-- Log temperatura notturna -->
    <div class="card" id="night-log-card" style="display:none">
      <div class="card-title">🌙 Notte scorsa — temperatura</div>
      <div id="night-log-body"></div>
    </div>

    <!-- Grafici 24h -->
    <div class="card">
      <div class="card-title">📊 Ultime 24h</div>
      <div id="hist-soc-container" style="margin-bottom:8px"></div>
      <div class="divider"></div>
      <div id="hist-pv-container" style="margin-bottom:8px"></div>
      <div class="divider"></div>
      <div id="hist-batt-container"></div>
    </div>

  </section>

  <!-- ── Riscaldatore ──────────────────────────────────────────────────────── -->
  <section class="screen" id="screen-heater">
    <div id="heater-body"></div>
  </section>

  <!-- ── Batterie ──────────────────────────────────────────────────────────── -->
  <section class="screen" id="screen-bms">
    <div id="bms-body"></div>
  </section>

  <!-- ── Solare (Victron) ──────────────────────────────────────────────────── -->
  <section class="screen" id="screen-victron">
    <div id="victron-body"></div>
  </section>

  <!-- ── Camere (Imou) ─────────────────────────────────────────────────────── -->
  <section class="screen" id="screen-imou">
    <div id="imou-body"></div>
  </section>

  <!-- ── Impostazioni ──────────────────────────────────────────────────────── -->
  <section class="screen" id="screen-settings">
    <div id="settings-body"></div>
  </section>

  <!-- ── Meteo ────────────────────────────────────────────────────────────── -->
  <section class="screen" id="screen-meteo">
    <div id="meteo-body"></div>
  </section>

  <!-- ── Documenti van ────────────────────────────────────────────────────── -->
  <section class="screen" id="screen-documenti">
    <div id="documenti-body"></div>
  </section>

  <!-- ── Campeggi ─────────────────────────────────────────────────────────── -->
  <section class="screen" id="screen-campeggi">
    <div id="campeggi-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:13px;color:var(--text-2)">Rilevamento automatico quando fermo 10+ min</span>
      <button class="btn btn-ghost" style="padding:6px 12px;font-size:12px" onclick="window.refreshCampeggi()">🔄</button>
    </div>
    <div id="campeggi-body"></div>
  </section>

  <!-- Floating dock -->
  <nav class="dock" id="main-dock">
    <button class="dock-btn active" data-tab="dash">
      <span class="dock-icon">🏠</span>
      <span class="dock-label">Home</span>
    </button>
    <button class="dock-btn" data-tab="heater">
      <span class="dock-icon">🔥</span>
      <span class="dock-label">Heater</span>
    </button>
    <button class="dock-btn" data-tab="bms">
      <span class="dock-icon">🔋</span>
      <span class="dock-label">Batterie</span>
    </button>
    <button class="dock-btn" data-tab="victron">
      <span class="dock-icon">☀️</span>
      <span class="dock-label">Solare</span>
    </button>
    <button class="dock-btn dock-more" id="dock-more-btn">
      <span class="dock-icon">•••</span>
      <span class="dock-label">Altro</span>
    </button>
  </nav>

  <!-- Bottom sheet backdrop -->
  <div class="dock-overlay" id="dock-overlay" onclick="window.closeDockSheet()"></div>

  <!-- Bottom sheet -->
  <div class="dock-sheet" id="dock-sheet">
    <div class="dock-sheet-handle"></div>
    <div class="dock-sheet-title">Sezioni</div>
    <div class="dock-sheet-grid dock-sheet-grid-3">
      <button class="dock-sheet-item" data-tab="imou">
        <span class="dock-sheet-icon">📷</span>
        <span>Camere</span>
      </button>
      <button class="dock-sheet-item" data-tab="settings">
        <span class="dock-sheet-icon">⚙️</span>
        <span>Config</span>
      </button>
      <button class="dock-sheet-item" data-tab="meteo">
        <span class="dock-sheet-icon">🌤</span>
        <span>Meteo</span>
      </button>
      <button class="dock-sheet-item" data-tab="campeggi">
        <span class="dock-sheet-icon">📍</span>
        <span>Campeggi</span>
      </button>
      <button class="dock-sheet-item" data-tab="documenti">
        <span class="dock-sheet-icon">📂</span>
        <span>Documenti</span>
      </button>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script>
  const _PRIMARY_TABS   = ['dash','heater','bms','victron'];
  const _SECONDARY_TABS = ['imou','settings','meteo','campeggi','documenti'];

  window.switchTab = (tab) => {
    document.querySelectorAll('#main-dock .dock-btn[data-tab]').forEach(b =>
      b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('.dock-sheet-item').forEach(b =>
      b.classList.toggle('active', b.dataset.tab === tab));
    const moreBtn = document.getElementById('dock-more-btn');
    if (moreBtn) moreBtn.classList.toggle('active', _SECONDARY_TABS.includes(tab));
    document.querySelectorAll('.screen').forEach(s =>
      s.classList.toggle('active', s.id === `screen-${tab}`));
    window.closeDockSheet();
    if (tab === 'meteo')     window._onTabMeteo?.();
    if (tab === 'campeggi')  window._onTabCampeggi?.();
    if (tab === 'documenti') window._onTabDocumenti?.();
  };

  window.openDockSheet  = () => {
    document.getElementById('dock-sheet').classList.add('open');
    document.getElementById('dock-overlay').classList.add('open');
  };
  window.closeDockSheet = () => {
    document.getElementById('dock-sheet').classList.remove('open');
    document.getElementById('dock-overlay').classList.remove('open');
  };

  document.getElementById('dock-more-btn').addEventListener('click', window.openDockSheet);
  document.querySelectorAll('.dock-sheet-item').forEach(btn =>
    btn.addEventListener('click', () => window.switchTab(btn.dataset.tab)));
  document.querySelectorAll('#main-dock .dock-btn[data-tab]').forEach(btn =>
    btn.addEventListener('click', () => window.switchTab(btn.dataset.tab)));

  // ── SPLASH ──
  (function() {
    const splash = document.getElementById('splash');
    if (!splash) return;
    function reveal() { document.body.classList.add('revealed'); }
    if (sessionStorage.getItem('caribu-splash')) {
      splash.classList.add('splash-gone');
      reveal();
      return;
    }
    sessionStorage.setItem('caribu-splash', '1');
    const fill = splash.querySelector('.splash-logo-fill');
    fill.addEventListener('animationend', () => {
      splash.classList.add('splash-out');
      reveal();
      splash.addEventListener('transitionend', () => splash.classList.add('splash-gone'), { once: true });
    }, { once: true });
  })();
</script>
<script type="module" src="/js/app.js"></script>
</body>
</html>
